name: InputBridgeMac
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "13.0"
targets:
  InputBridgeMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/InputBridgeMac
    settings:
      base:
        PRODUCT_NAME: InputBridge
        PRODUCT_BUNDLE_IDENTIFIER: com.inputbridge.mac
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - framework: SwiftUI.framework
      - framework: CoreBluetooth.framework
      - framework: Security.framework
      - framework: ServiceManagement.framework
      - framework: IOBluetooth.framework
    scheme:
      testTargets: []
      gatherCoverageData: false
